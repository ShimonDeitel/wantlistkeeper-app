name: RecordStoreWantlist
options:
  bundleIdPrefix: com.shimondeitel.wantlistkeeper
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  RecordStoreWantlist:
    type: application
    platform: iOS
    sources:
      - path: RecordStoreWantlist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.wantlistkeeper
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: RecordStoreWantlist/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RecordStoreWantlistTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RecordStoreWantlistTests
      - path: RecordStoreWantlist.storekit
    dependencies:
      - target: RecordStoreWantlist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.wantlistkeeper.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RecordStoreWantlistUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RecordStoreWantlistUITests
    dependencies:
      - target: RecordStoreWantlist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.wantlistkeeper.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  RecordStoreWantlist:
    build:
      targets:
        RecordStoreWantlist: all
        RecordStoreWantlistTests: [test]
        RecordStoreWantlistUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: RecordStoreWantlist.storekit
    test:
      config: Debug
      storeKitConfiguration: RecordStoreWantlist.storekit
      targets:
        - RecordStoreWantlistTests
        - RecordStoreWantlistUITests
    archive:
      config: Release
