<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Record Store Wantlist</title>
<style>
  body { margin:0; background:#0A0A0A; color:#EDEDED; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:24px; }
  .wrap { max-width:560px; }
  h1 { font-size:2.2rem; margin-bottom:0.4rem; color:#6C4AB6; }
  p.tag { color:#B8B8B8; font-size:1.1rem; margin-bottom:2rem; }
  .feature { background:#151515; border:1px solid #6C4AB633; border-radius:14px; padding:20px; margin-bottom:12px; text-align:left; }
  .feature h3 { margin:0 0 6px 0; color:#6C4AB6; font-size:1rem; }
  .feature p { margin:0; color:#CFCFCF; font-size:0.95rem; }
  a.btn { display:inline-block; margin-top:24px; padding:12px 28px; background:#6C4AB6; color:#0A0A0A; border-radius:999px; text-decoration:none; font-weight:600; }
  footer { margin-top:40px; font-size:0.8rem; color:#666; }
  footer a { color:#888; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #6C4AB655 0%, #6C4AB600 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Record Store Wantlist</h1>
  <p class="tag">Track a collector's wantlist across any hobby with price alerts you set manually.</p>
  <div class="feature"><h3>Free</h3><p>Log wanted items with target price.</p></div>
  <div class="feature"><h3>Pro</h3><p>Priority ranking and found-item history log.</p></div>
  <a class="btn" href="#">Coming to the App Store</a>
  <footer>
    <a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a><br>
    Contact: s0533495227@gmail.com
  </footer>
</div>
</body>
</html>
